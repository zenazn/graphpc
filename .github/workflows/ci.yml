name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimize the GITHUB_TOKEN scope: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to full commit SHAs (mutable tags can be
      # repointed by a compromised action repo). Bump via Dependabot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run format:check
      - run: bun run build
